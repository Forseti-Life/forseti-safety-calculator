services:
  safety_calculator.calculator:
    class: Drupal\safety_calculator\SafetyCalculatorService
    arguments: ['@database', '@logger.factory']
    
  safety_calculator.risk_analyzer:
    class: Drupal\safety_calculator\RiskAnalyzerService
    arguments: ['@database', '@safety_calculator.calculator']
  
  safety_calculator.metrics_import_commands:
    class: Drupal\safety_calculator\Commands\MetricsImportCommands
    arguments: ['@database']
    tags:
      - { name: drush.command }

  safety_calculator.individual_metrics_repository:
    class: Drupal\safety_calculator\Repository\IndividualMetricsRepository
    arguments: ['@database', '@logger.factory']

  safety_calculator.zscore_calculation:
    class: Drupal\safety_calculator\Service\ZScoreCalculationService
    arguments: ['@database', '@safety_calculator.individual_metrics_repository', '@logger.factory']

  safety_calculator.zscore_commands:
    class: Drupal\safety_calculator\Commands\ZScoreCommands
    arguments: ['@safety_calculator.zscore_calculation']
    tags:
      - { name: drush.command }

